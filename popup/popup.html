<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Stash</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Stash</h1>
      <div class="header-btns">
        <button id="digest-btn" class="digest-btn" title="Generate Daily Digest">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Digest
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Setup prompt -->
    <div class="setup-prompt" id="setup-prompt" style="display:none;">
      <p>Configure your settings to start saving bookmarks</p>
      <button id="setup-btn" class="btn-primary-small">Open Settings</button>
    </div>

    <!-- Digest status -->
    <div class="digest-status" id="digest-status" style="display:none;"></div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by text, tag, or category..." autocomplete="off">
    </div>

    <div class="stats" id="stats"></div>

    <div class="bookmark-list" id="bookmark-list">
      <div class="empty-state" id="empty-state">
        <p>No bookmarks yet</p>
        <p class="hint">Bookmark a post on X or LinkedIn to get started</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
